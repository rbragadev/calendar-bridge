services:
  - type: web
    name: calendar-bridge-api
    runtime: node
    buildCommand: cd api && npm install && npx prisma generate && npm run build
    startCommand: cd api && npx prisma migrate deploy && node dist/main
    healthCheckPath: /google/accounts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: INTERNAL_SYNC_TOKEN
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

  - type: web
    name: calendar-bridge-web
    runtime: static
    buildCommand: cd web && npm install && npm run build
    envVars:
      - key: VITE_API_URL
        sync: false
